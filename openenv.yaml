name: task-scheduling-env
description: Simple task scheduling environment
entry_point: server.app:main

tasks:
  - id: easy
    description: Complete all tasks in easy mode
    grader: grader.grade_easy
    level: easy

  - id: medium
    description: Complete tasks with priority weighting in medium mode
    grader: grader.grade_medium
    level: medium

  - id: hard
    description: Complete tasks respecting deadlines in hard mode
    grader: grader.grade_hard
    level: hard
